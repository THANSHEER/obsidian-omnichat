name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: [main]

# Cancel any in-progress run for the same branch when a new push arrives.
# Keeps the queue clean and saves CI minutes.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ── Lint ──────────────────────────────────────────────────
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

    # ── Type-check ────────────────────────────────────────────
    typecheck:
        name: Type-check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Type-check
              run: npx tsc --noEmit --skipLibCheck

    # ── Unit tests ────────────────────────────────────────────
    test:
        name: Unit tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test

    # ── Build (runs only when all three above pass) ───────────
    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint, typecheck, test]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Verify release artifacts
              run: |
                  test -f main.js       || (echo "main.js missing"       && exit 1)
                  test -f manifest.json || (echo "manifest.json missing" && exit 1)
                  test -f styles.css    || (echo "styles.css missing"    && exit 1)
